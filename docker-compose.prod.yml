version: '3.8'

services:
  american_school_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: american_school_app
    restart: unless-stopped
    env_file:
      - .env

  american_school_web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: american_school_web
    restart: unless-stopped
    ports:
      - "8081:80" # Expone el puerto 8081 al host VPS
    depends_on:
      - american_school_app

# Nota: No definimos red externa aquí. 
# Si necesitas conectarte al contenedor "postgres" existente de la VPS,
# asegúrate de usar la IP del host en el .env (ej. 172.17.0.1) o agregar la red.
